<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Flux Admin Panel</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  :root {
    --bg: #0f1117;
    --sidebar: #161b22;
    --panel: #1c2128;
    --border: #30363d;
    --accent: #58a6ff;
    --accent2: #3fb950;
    --danger: #f85149;
    --warn: #d29922;
    --text: #e6edf3;
    --text2: #8b949e;
    --msg-user: #1f3a5f;
    --msg-ai: #1a2730;
    --input-bg: #21262d;
  }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); height: 100vh; display: flex; flex-direction: column; overflow: hidden; }

  /* LOGIN */
  #login-screen { display: flex; align-items: center; justify-content: center; height: 100vh; }
  .login-box { background: var(--panel); border: 1px solid var(--border); border-radius: 12px; padding: 40px; width: 360px; text-align: center; }
  .login-box h1 { font-size: 28px; margin-bottom: 6px; color: var(--accent); }
  .login-box p { color: var(--text2); margin-bottom: 28px; font-size: 14px; }
  .login-box input { width: 100%; padding: 12px 16px; background: var(--input-bg); border: 1px solid var(--border); border-radius: 8px; color: var(--text); font-size: 15px; outline: none; margin-bottom: 14px; transition: border .2s; }
  .login-box input:focus { border-color: var(--accent); }
  .login-box button { width: 100%; padding: 12px; background: var(--accent); color: #fff; border: none; border-radius: 8px; font-size: 15px; font-weight: 600; cursor: pointer; transition: opacity .2s; }
  .login-box button:hover { opacity: .85; }
  .login-error { color: var(--danger); font-size: 13px; margin-top: 10px; display: none; }

  /* APP */
  #app { display: none; flex-direction: column; height: 100vh; }
  header { display: flex; align-items: center; justify-content: space-between; padding: 12px 20px; background: var(--sidebar); border-bottom: 1px solid var(--border); flex-shrink: 0; }
  header .logo { font-size: 20px; font-weight: 700; color: var(--accent); }
  .header-right { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; }
  .status-badge { padding: 5px 12px; border-radius: 20px; font-size: 13px; font-weight: 600; }
  .status-badge.running { background: rgba(63,185,80,.15); color: var(--accent2); border: 1px solid rgba(63,185,80,.3); }
  .status-badge.stopped { background: rgba(248,81,73,.15); color: var(--danger); border: 1px solid rgba(248,81,73,.3); }
  .btn { padding: 7px 16px; border-radius: 7px; font-size: 13px; font-weight: 600; cursor: pointer; border: none; transition: opacity .2s; }
  .btn:hover { opacity: .8; }
  .btn-green { background: var(--accent2); color: #fff; }
  .btn-red { background: var(--danger); color: #fff; }
  .btn-blue { background: var(--accent); color: #fff; }
  .btn-gray { background: var(--border); color: var(--text); }
  .btn-warn { background: var(--warn); color: #fff; }

  .stats-bar { display: flex; gap: 12px; padding: 8px 16px; background: var(--sidebar); border-bottom: 1px solid var(--border); flex-shrink: 0; flex-wrap: wrap; }
  .stat { background: var(--panel); border: 1px solid var(--border); border-radius: 8px; padding: 6px 14px; font-size: 13px; display: flex; align-items: center; gap: 6px; }
  .stat-val { font-weight: 700; color: var(--accent); font-size: 15px; }

  .main { display: flex; flex: 1; overflow: hidden; }

  /* SIDEBAR */
  .sidebar { width: 270px; background: var(--sidebar); border-right: 1px solid var(--border); display: flex; flex-direction: column; flex-shrink: 0; }
  .sidebar-header { padding: 12px 14px; border-bottom: 1px solid var(--border); }
  .sidebar-header h3 { font-size: 12px; font-weight: 700; color: var(--text2); text-transform: uppercase; letter-spacing: .5px; margin-bottom: 8px; }
  .search-input { width: 100%; padding: 7px 11px; background: var(--input-bg); border: 1px solid var(--border); border-radius: 7px; color: var(--text); font-size: 13px; outline: none; }
  .search-input:focus { border-color: var(--accent); }
  .chat-list { flex: 1; overflow-y: auto; }
  .chat-item { padding: 11px 14px; cursor: pointer; border-bottom: 1px solid rgba(48,54,61,.4); transition: background .15s; display: flex; align-items: center; gap: 10px; }
  .chat-item:hover { background: rgba(88,166,255,.06); }
  .chat-item.active { background: rgba(88,166,255,.13); border-left: 3px solid var(--accent); }
  .chat-avatar { width: 34px; height: 34px; border-radius: 50%; background: linear-gradient(135deg, #58a6ff, #3fb950); display: flex; align-items: center; justify-content: center; font-weight: 700; font-size: 14px; color: #fff; flex-shrink: 0; }
  .chat-info { flex: 1; min-width: 0; }
  .chat-name { font-size: 14px; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .chat-preview { font-size: 12px; color: var(--text2); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; margin-top: 2px; }
  .chat-meta { font-size: 11px; color: var(--text2); text-align: right; flex-shrink: 0; }
  .no-chats { padding: 20px; text-align: center; color: var(--text2); font-size: 13px; }

  /* CHAT PANEL — persistent structure */
  .chat-panel { flex: 1; display: flex; flex-direction: column; overflow: hidden; }

  #chat-header { padding: 13px 18px; border-bottom: 1px solid var(--border); background: var(--panel); flex-shrink: 0; display: none; }
  #chat-header .chat-panel-title { font-size: 16px; font-weight: 700; }
  #chat-header .chat-panel-sub { font-size: 12px; color: var(--text2); margin-top: 2px; }

  #empty-placeholder { flex: 1; display: flex; align-items: center; justify-content: center; flex-direction: column; gap: 12px; color: var(--text2); }
  #empty-placeholder .icon { font-size: 52px; }

  #messages-area { flex: 1; overflow-y: auto; padding: 16px; display: flex; flex-direction: column; gap: 10px; display: none; }

  #send-bar { padding: 12px 14px; border-top: 1px solid var(--border); background: var(--panel); display: none; gap: 10px; align-items: flex-end; flex-shrink: 0; }
  #msg-input { flex: 1; padding: 10px 14px; background: var(--input-bg); border: 1px solid var(--border); border-radius: 10px; color: var(--text); font-size: 14px; resize: none; outline: none; min-height: 42px; max-height: 120px; font-family: inherit; line-height: 1.4; }
  #msg-input:focus { border-color: var(--accent); }
  #send-btn { padding: 10px 18px; background: var(--accent); color: #fff; border: none; border-radius: 10px; font-size: 14px; font-weight: 600; cursor: pointer; white-space: nowrap; transition: opacity .2s; }
  #send-btn:hover { opacity: .85; }
  #send-btn:disabled { opacity: .4; cursor: not-allowed; }

  /* MESSAGES */
  .msg { display: flex; flex-direction: column; max-width: 75%; }
  .msg.user { align-self: flex-end; align-items: flex-end; }
  .msg.assistant { align-self: flex-start; align-items: flex-start; }
  .msg.admin { align-self: flex-end; align-items: flex-end; }
  .msg-bubble { padding: 9px 13px; border-radius: 12px; font-size: 14px; line-height: 1.5; white-space: pre-wrap; word-break: break-word; }
  .msg.user .msg-bubble { background: var(--msg-user); border-bottom-right-radius: 4px; }
  .msg.assistant .msg-bubble { background: var(--msg-ai); border-bottom-left-radius: 4px; }
  .msg.admin .msg-bubble { background: rgba(210,153,34,.18); border: 1px solid rgba(210,153,34,.35); border-bottom-right-radius: 4px; }
  .msg-label { font-size: 11px; color: var(--text2); margin-bottom: 3px; padding: 0 3px; }
  .msg-time { font-size: 10px; color: var(--text2); margin-top: 2px; padding: 0 3px; }
  .msgs-empty { flex: 1; text-align: center; color: var(--text2); font-size: 14px; padding-top: 40px; }

  /* MODAL */
  .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,.7); z-index: 100; align-items: center; justify-content: center; }
  .modal-overlay.open { display: flex; }
  .modal { background: var(--panel); border: 1px solid var(--border); border-radius: 12px; padding: 28px; width: 480px; max-width: 95vw; }
  .modal h3 { font-size: 18px; margin-bottom: 16px; }
  .modal textarea { width: 100%; height: 140px; padding: 12px; background: var(--input-bg); border: 1px solid var(--border); border-radius: 8px; color: var(--text); font-size: 14px; resize: none; outline: none; font-family: inherit; margin-bottom: 16px; }
  .modal textarea:focus { border-color: var(--accent); }
  .modal-footer { display: flex; gap: 10px; justify-content: flex-end; }

  /* TOAST */
  .toast { position: fixed; bottom: 24px; right: 24px; padding: 12px 20px; border-radius: 8px; font-size: 14px; font-weight: 500; z-index: 200; animation: slideUp .3s ease; }
  .toast.success { background: var(--accent2); color: #fff; }
  .toast.error { background: var(--danger); color: #fff; }
  @keyframes slideUp { from { transform: translateY(16px); opacity:0; } to { transform: translateY(0); opacity:1; } }

  ::-webkit-scrollbar { width: 5px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
</style>
</head>
<body>

<!-- LOGIN -->
<div id="login-screen">
  <div class="login-box">
    <h1>⚡ Flux</h1>
    <p>Панель администратора</p>
    <input type="password" id="password-input" placeholder="Введи пароль" />
    <button onclick="login()">Войти</button>
    <div class="login-error" id="login-error">Неверный пароль</div>
  </div>
</div>

<!-- APP -->
<div id="app">
  <header>
    <div class="logo">⚡ Flux Admin</div>
    <div class="header-right">
      <div class="status-badge running" id="bot-status-badge">🟢 Бот работает</div>
      <button class="btn btn-red" id="stop-btn" onclick="stopBot()">⏹ Остановить</button>
      <button class="btn btn-green" id="start-btn" onclick="startBot()" style="display:none">▶ Запустить</button>
      <button class="btn btn-warn" onclick="openBroadcast()">📢 Рассылка</button>
      <button class="btn btn-gray" onclick="logout()">Выйти</button>
    </div>
  </header>

  <div class="stats-bar">
    <div class="stat">👥 Пользователей: <span class="stat-val" id="stat-users">—</span></div>
    <div class="stat">💬 Сообщений: <span class="stat-val" id="stat-msgs">—</span></div>
    <div class="stat">🧠 Активных чатов: <span class="stat-val" id="stat-chats">—</span></div>
  </div>

  <div class="main">
    <div class="sidebar">
      <div class="sidebar-header">
        <h3>Пользователи</h3>
        <input class="search-input" type="text" placeholder="Поиск..." id="search-input" oninput="filterChats()" />
      </div>
      <div class="chat-list" id="chat-list">
        <div class="no-chats">Нет пользователей</div>
      </div>
    </div>

    <!-- Persistent chat panel — never recreated -->
    <div class="chat-panel">
      <div id="chat-header">
        <div class="chat-panel-title" id="chat-title"></div>
        <div class="chat-panel-sub" id="chat-sub"></div>
      </div>
      <div id="empty-placeholder">
        <div class="icon">💬</div>
        <p>Выбери пользователя слева</p>
      </div>
      <div id="messages-area"></div>
      <div id="send-bar">
        <textarea id="msg-input" placeholder="Написать пользователю..." rows="1" onkeydown="handleKey(event)"></textarea>
        <button id="send-btn" onclick="sendMsg()">Отправить</button>
      </div>
    </div>
  </div>
</div>

<!-- BROADCAST MODAL -->
<div class="modal-overlay" id="broadcast-modal">
  <div class="modal">
    <h3>📢 Рассылка всем пользователям</h3>
    <textarea id="broadcast-text" placeholder="Введи текст рассылки..."></textarea>
    <div class="modal-footer">
      <button class="btn btn-gray" onclick="closeBroadcast()">Отмена</button>
      <button class="btn btn-warn" onclick="sendBroadcast()">Отправить всем</button>
    </div>
  </div>
</div>

<script>
let token = localStorage.getItem('flux_admin_token') || '';
let allChats = [];
let selectedChatId = null;
let currentMsgCount = 0;

async function api(path, method = 'GET', body = null) {
  const opts = {
    method,
    headers: { 'Content-Type': 'application/json', 'X-Admin-Token': token }
  };
  if (body) opts.body = JSON.stringify(body);
  const r = await fetch('/admin/api' + path, opts);
  return r.json();
}

async function login() {
  const pw = document.getElementById('password-input').value;
  const res = await fetch('/admin/login', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ password: pw })
  });
  const data = await res.json();
  if (data.ok) {
    token = data.token;
    localStorage.setItem('flux_admin_token', token);
    showApp();
  } else {
    document.getElementById('login-error').style.display = 'block';
  }
}

document.getElementById('password-input').addEventListener('keydown', e => {
  if (e.key === 'Enter') login();
});

async function checkAuth() {
  if (!token) return false;
  try { const r = await api('/status'); return r.ok; } catch { return false; }
}

function showApp() {
  document.getElementById('login-screen').style.display = 'none';
  document.getElementById('app').style.display = 'flex';
  loadChats();
  loadStats();
  loadStatus();
  setInterval(() => {
    loadChats();
    loadStats();
    loadStatus();
  }, 8000);
  setInterval(() => {
    if (selectedChatId) refreshMessages();
  }, 4000);
}

function logout() {
  localStorage.removeItem('flux_admin_token');
  location.reload();
}

async function loadStats() {
  const d = await api('/stats');
  if (!d.ok) return;
  document.getElementById('stat-users').textContent = d.users;
  document.getElementById('stat-msgs').textContent = d.messages;
  document.getElementById('stat-chats').textContent = d.chats;
}

async function loadStatus() {
  const d = await api('/status');
  if (!d.ok) { logout(); return; }
  const badge = document.getElementById('bot-status-badge');
  const stopBtn = document.getElementById('stop-btn');
  const startBtn = document.getElementById('start-btn');
  if (d.bot_active) {
    badge.textContent = '🟢 Бот работает';
    badge.className = 'status-badge running';
    stopBtn.style.display = '';
    startBtn.style.display = 'none';
  } else {
    badge.textContent = '🔴 Бот остановлен';
    badge.className = 'status-badge stopped';
    stopBtn.style.display = 'none';
    startBtn.style.display = '';
  }
}

async function stopBot() {
  await api('/bot/stop', 'POST');
  toast('Бот остановлен', 'error');
  loadStatus();
}

async function startBot() {
  await api('/bot/start', 'POST');
  toast('Бот запущен', 'success');
  loadStatus();
}

async function loadChats() {
  const d = await api('/chats');
  if (!d.ok) return;
  allChats = d.chats;
  filterChats();
}

function filterChats() {
  const q = document.getElementById('search-input').value.toLowerCase();
  const filtered = q
    ? allChats.filter(c =>
        (c.name||'').toLowerCase().includes(q) ||
        (c.username||'').toLowerCase().includes(q) ||
        String(c.chat_id).includes(q))
    : allChats;
  renderChatList(filtered);
}

function renderChatList(chats) {
  const el = document.getElementById('chat-list');
  if (!chats.length) { el.innerHTML = '<div class="no-chats">Нет пользователей</div>'; return; }
  el.innerHTML = chats.map(c => {
    const initials = (c.name || '?').charAt(0).toUpperCase();
    const active = c.chat_id === selectedChatId ? 'active' : '';
    const preview = c.last_message ? escHtml(c.last_message).substring(0, 38) : 'Нет сообщений';
    return `<div class="chat-item ${active}" onclick="selectChat(${c.chat_id}, ${JSON.stringify(c.name)}, ${JSON.stringify(c.username || '')})">
      <div class="chat-avatar">${initials}</div>
      <div class="chat-info">
        <div class="chat-name">${escHtml(c.name || 'Пользователь')}</div>
        <div class="chat-preview">${preview}</div>
      </div>
      <div class="chat-meta">${c.msg_count || 0}<br>сообщ.</div>
    </div>`;
  }).join('');
}

async function selectChat(chatId, name, username) {
  selectedChatId = chatId;
  currentMsgCount = 0;

  // Update header — don't touch the textarea
  document.getElementById('chat-header').style.display = 'block';
  document.getElementById('chat-title').textContent = name || 'Пользователь';
  document.getElementById('chat-sub').textContent =
    (username ? `@${username} · ` : '') + `ID: ${chatId}`;
  document.getElementById('msg-input').placeholder = `Написать ${name || 'пользователю'}...`;

  // Show persistent elements
  document.getElementById('empty-placeholder').style.display = 'none';
  document.getElementById('messages-area').style.display = 'flex';
  document.getElementById('send-bar').style.display = 'flex';

  filterChats();
  await refreshMessages(true);
}

async function refreshMessages(scrollToBottom = false) {
  if (!selectedChatId) return;
  const d = await api(`/chat/${selectedChatId}`);
  if (!d.ok) return;

  const msgs = d.messages;
  // Only re-render if message count changed
  if (!scrollToBottom && msgs.length === currentMsgCount) return;
  currentMsgCount = msgs.length;

  const area = document.getElementById('messages-area');
  const wasAtBottom = area.scrollHeight - area.scrollTop - area.clientHeight < 60;

  if (!msgs.length) {
    area.innerHTML = '<div class="msgs-empty">Нет сообщений</div>';
    return;
  }

  area.innerHTML = msgs.map(m => {
    const cls = m.role === 'user' ? 'user' : m.role === 'admin' ? 'admin' : 'assistant';
    const label = m.role === 'user'
      ? `👤 ${escHtml(d.name || 'Пользователь')}`
      : m.role === 'admin' ? '🔑 Администратор' : '⚡ Flux';
    const time = m.time ? `<div class="msg-time">${m.time}</div>` : '';
    return `<div class="msg ${cls}">
      <div class="msg-label">${label}</div>
      <div class="msg-bubble">${escHtml(m.content)}</div>
      ${time}
    </div>`;
  }).join('');

  if (scrollToBottom || wasAtBottom) {
    area.scrollTop = area.scrollHeight;
  }
}

function handleKey(e) {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMsg(); }
}

async function sendMsg() {
  if (!selectedChatId) return;
  const inp = document.getElementById('msg-input');
  const text = inp.value.trim();
  if (!text) return;
  inp.value = '';
  inp.style.height = '';
  document.getElementById('send-btn').disabled = true;
  await api('/send', 'POST', { chat_id: selectedChatId, text });
  document.getElementById('send-btn').disabled = false;
  await refreshMessages(true);
  toast('Отправлено', 'success');
  inp.focus();
}

function openBroadcast() { document.getElementById('broadcast-modal').classList.add('open'); }
function closeBroadcast() {
  document.getElementById('broadcast-modal').classList.remove('open');
  document.getElementById('broadcast-text').value = '';
}
async function sendBroadcast() {
  const text = document.getElementById('broadcast-text').value.trim();
  if (!text) return;
  const d = await api('/broadcast', 'POST', { text });
  closeBroadcast();
  toast(`Рассылка отправлена ${d.sent || 0} пользователям`, 'success');
}

function toast(msg, type = 'success') {
  const el = document.createElement('div');
  el.className = `toast ${type}`;
  el.textContent = msg;
  document.body.appendChild(el);
  setTimeout(() => el.remove(), 3000);
}

function escHtml(str) {
  return String(str)
    .replace(/&/g,'&amp;').replace(/</g,'&lt;')
    .replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// Auto-resize textarea
document.getElementById('msg-input').addEventListener('input', function() {
  this.style.height = 'auto';
  this.style.height = Math.min(this.scrollHeight, 120) + 'px';
});

(async () => {
  const ok = await checkAuth();
  if (ok) showApp();
})();
</script>
</body>
</html>
