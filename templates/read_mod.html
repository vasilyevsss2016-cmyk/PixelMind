<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>PixelMind — Просмотр мода</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><text y='28' font-size='28'>⚡</text></svg>">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#07080f; --surface:rgba(255,255,255,0.04); --surface2:rgba(255,255,255,0.07);
  --border:rgba(255,255,255,0.1); --border2:rgba(255,255,255,0.15);
  --text:#e8eaf2; --text2:#8b92b8; --text3:#555d80;
  --accent:#3a8eff; --purple:#7c3aed; --radius:16px;
  --green:#4ade80;
}
body{background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;min-height:100vh;line-height:1.5}

.page{max-width:860px;margin:0 auto;padding:32px 20px 80px}

/* Header */
.header{display:flex;align-items:center;gap:14px;margin-bottom:40px}
.header-logo{width:44px;height:44px;background:linear-gradient(135deg,#3a8eff,#7c3aed);border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:22px;flex-shrink:0}
.header-title h1{font-size:22px;font-weight:800;background:linear-gradient(135deg,#5aabff,#a78bfa);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.header-title p{font-size:13px;color:var(--text2);margin-top:1px}
.header-links{margin-left:auto;display:flex;gap:10px}
.header-link{font-size:13px;color:var(--text2);text-decoration:none;padding:7px 14px;border-radius:20px;border:1px solid var(--border);transition:all .2s;white-space:nowrap}
.header-link:hover{color:var(--text);background:var(--surface)}
.header-link.primary{background:linear-gradient(135deg,rgba(58,142,255,0.2),rgba(124,58,237,0.2));border-color:rgba(90,171,255,0.35);color:#a0c8ff}
.header-link.primary:hover{background:linear-gradient(135deg,rgba(58,142,255,0.3),rgba(124,58,237,0.3));color:#fff}

/* Drop zone */
.drop-zone{
  border:2px dashed var(--border2);border-radius:20px;padding:52px 24px;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  gap:14px;cursor:pointer;transition:all .25s;text-align:center;
  background:var(--surface);
}
.drop-zone:hover,.drop-zone.drag-over{border-color:rgba(90,171,255,0.55);background:rgba(90,171,255,0.05)}
.drop-icon{font-size:52px;line-height:1;filter:drop-shadow(0 0 18px rgba(90,171,255,0.35))}
.drop-title{font-size:18px;font-weight:700;color:var(--text)}
.drop-sub{font-size:13px;color:var(--text2);max-width:300px}
.drop-btn{margin-top:6px;padding:10px 24px;border-radius:10px;border:1px solid rgba(90,171,255,0.4);background:rgba(90,171,255,0.1);color:#5aabff;font-size:13px;font-weight:600;cursor:pointer;transition:all .2s}
.drop-btn:hover{background:rgba(90,171,255,0.2);border-color:rgba(90,171,255,0.7)}
.drop-demo-btn{margin-top:8px;padding:7px 18px;border-radius:20px;border:1px solid rgba(167,139,250,0.3);background:transparent;color:var(--text3);font-size:12px;cursor:pointer;transition:all .2s}
.drop-demo-btn:hover{color:#a78bfa;border-color:rgba(167,139,250,0.6);background:rgba(124,58,237,0.07)}
#file-input{display:none}

/* Mod card */
#mod-view{display:none}

.mod-card{background:var(--surface);border:1px solid var(--border);border-radius:20px;padding:28px;margin-bottom:24px}
.mod-card-header{display:flex;align-items:center;gap:16px;margin-bottom:20px}
.mod-avatar-big{width:62px;height:62px;border-radius:16px;display:flex;align-items:center;justify-content:center;font-size:30px;border:2px solid rgba(255,255,255,0.12);flex-shrink:0}
.mod-main-info{flex:1;min-width:0}
.mod-main-name{font-size:22px;font-weight:800;color:var(--text);margin-bottom:4px}
.mod-main-desc{font-size:14px;color:var(--text2);line-height:1.5}
.mod-badge{display:inline-flex;align-items:center;gap:5px;padding:4px 10px;border-radius:20px;font-size:11px;font-weight:700;background:rgba(124,58,237,0.15);border:1px solid rgba(124,58,237,0.3);color:#c084fc;margin-top:8px}

.mod-meta{display:flex;flex-wrap:wrap;gap:10px;margin-bottom:20px}
.meta-chip{display:flex;align-items:center;gap:6px;padding:7px 12px;background:var(--surface2);border:1px solid var(--border);border-radius:10px;font-size:12.5px;color:var(--text2)}
.meta-chip strong{color:var(--text);font-weight:600}

/* Section */
.section{margin-bottom:20px}
.section-label{font-size:11px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:.7px;margin-bottom:10px;display:flex;align-items:center;gap:8px}
.section-label::after{content:'';flex:1;height:1px;background:var(--border)}

/* System prompt block */
.prompt-box{background:rgba(10,14,26,0.6);border:1px solid var(--border);border-radius:14px;padding:18px 20px;font-size:14px;line-height:1.7;max-height:600px;overflow-y:auto;word-break:break-word}
.prompt-box::-webkit-scrollbar{width:5px}
.prompt-box::-webkit-scrollbar-track{background:transparent}
.prompt-box::-webkit-scrollbar-thumb{background:rgba(255,255,255,0.12);border-radius:4px}

/* Markdown inside prompt-box */
.prompt-box p{margin:0 0 10px}
.prompt-box p:last-child{margin-bottom:0}
.prompt-box h1,.prompt-box h2,.prompt-box h3{font-weight:700;margin:14px 0 7px;color:var(--text)}
.prompt-box h1{font-size:19px}.prompt-box h2{font-size:17px}.prompt-box h3{font-size:15px}
.prompt-box ul,.prompt-box ol{padding-left:22px;margin:8px 0}
.prompt-box li{margin:4px 0}
.prompt-box blockquote{border-left:3px solid var(--accent);padding:6px 14px;margin:10px 0;background:rgba(90,171,255,0.07);border-radius:0 9px 9px 0;color:var(--text2)}
.prompt-box hr{border:none;border-top:1px solid var(--border);margin:12px 0}
.prompt-box a{color:var(--accent);text-decoration:underline}
.prompt-box strong{font-weight:700;color:var(--text)}
.prompt-box em{font-style:italic;color:var(--text2)}
.prompt-box table{border-collapse:collapse;width:100%;margin:10px 0;font-size:13px}
.prompt-box th,.prompt-box td{border:1px solid var(--border);padding:7px 11px;text-align:left}
.prompt-box th{background:rgba(255,255,255,0.07);font-weight:600}
.prompt-box code:not(.hljs){background:rgba(255,255,255,0.1);border:1px solid rgba(255,255,255,0.12);border-radius:5px;padding:1px 5px;font-family:'Fira Mono',monospace;font-size:12.5px;color:#a78bfa}

/* Code blocks */
.code-block-wrap{position:relative;margin:10px 0;border-radius:10px;overflow:hidden;border:1px solid rgba(255,255,255,0.1)}
.code-block-header{display:flex;align-items:center;justify-content:space-between;padding:7px 12px;background:rgba(0,0,0,0.38);font-size:11px;color:var(--text2)}
.code-block-lang{text-transform:uppercase;font-weight:600;letter-spacing:.5px}
.code-block-copy{display:flex;align-items:center;gap:5px;background:rgba(255,255,255,0.08);border:1px solid rgba(255,255,255,0.12);border-radius:6px;padding:3px 9px;cursor:pointer;font-size:11px;color:var(--text2);transition:all .18s}
.code-block-copy:hover{background:rgba(255,255,255,0.15);color:var(--text)}
.code-block-copy.copied{color:var(--green);border-color:rgba(74,222,128,0.4)}
.code-block-wrap pre{margin:0;border-radius:0;border:none;max-height:420px;overflow-x:auto;background:#0d1117}
.code-block-wrap pre code{display:block;padding:14px 16px;font-size:12.5px;font-family:'Fira Mono',monospace;color:#c9d1d9;line-height:1.6;white-space:pre;word-break:normal}

/* Raw JSON toggle */
.raw-toggle{display:inline-flex;align-items:center;gap:6px;font-size:12px;color:var(--accent);cursor:pointer;user-select:none;transition:opacity .2s}
.raw-toggle:hover{opacity:.75}
.raw-box{display:none;margin-top:10px;background:rgba(0,0,0,0.3);border:1px solid var(--border);border-radius:10px;padding:14px 16px;font-family:'Fira Mono',monospace;font-size:12px;color:#7ec8ff;line-height:1.7;overflow:auto;max-height:340px;white-space:pre;word-break:break-all}
.raw-box.visible{display:block}

/* Actions */
.actions{display:flex;gap:12px;flex-wrap:wrap;margin-top:8px}
.btn-primary{flex:1;min-width:160px;padding:13px;border-radius:12px;border:none;cursor:pointer;font-size:14px;font-weight:700;background:linear-gradient(135deg,#3a8eff,#1a6de0);color:#fff;box-shadow:0 4px 18px rgba(58,142,255,0.35);transition:all .2s;display:flex;align-items:center;justify-content:center;gap:8px;text-decoration:none}
.btn-primary:hover{transform:translateY(-2px);box-shadow:0 6px 26px rgba(58,142,255,0.5)}
.btn-ghost{flex:1;min-width:160px;padding:13px;border-radius:12px;border:1px solid var(--border2);cursor:pointer;font-size:14px;font-weight:600;background:var(--surface2);color:var(--text2);transition:all .2s;display:flex;align-items:center;justify-content:center;gap:8px;text-decoration:none}
.btn-ghost:hover{background:var(--surface);color:var(--text);border-color:rgba(255,255,255,0.25)}

/* Load another */
.load-another{text-align:center;margin-top:28px}
.load-another-btn{display:inline-flex;align-items:center;gap:7px;padding:9px 20px;border-radius:20px;border:1px solid var(--border);background:transparent;color:var(--text2);font-size:13px;cursor:pointer;transition:all .2s}
.load-another-btn:hover{color:var(--text);background:var(--surface);border-color:var(--border2)}

/* Toast */
#toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(20px);background:rgba(20,25,45,0.97);border:1px solid var(--border);border-radius:12px;padding:10px 22px;font-size:13px;color:var(--text);opacity:0;transition:all .3s;pointer-events:none;z-index:999;white-space:nowrap}
#toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

@media(max-width:600px){
  .header{flex-wrap:wrap;gap:10px}
  .header-links{margin-left:0;width:100%}
  .header-link{flex:1;text-align:center;padding:7px 8px;font-size:12px}
  .actions{flex-direction:column}
  .btn-primary,.btn-ghost{min-width:0}
}
</style>
</head>
<body>
<div class="page">

  <!-- Header -->
  <div class="header">
    <div class="header-logo">⚡</div>
    <div class="header-title">
      <h1>Просмотр мода</h1>
      <p>Читай .pixelmod файлы с подсветкой</p>
    </div>
    <div class="header-links">
      <a href="/create-mod" class="header-link">✏️ Создать мод</a>
      <a href="/app" class="header-link primary">💬 Открыть чат</a>
    </div>
  </div>

  <!-- Drop zone -->
  <div class="drop-zone" id="drop-zone">
    <div class="drop-icon">📦</div>
    <div class="drop-title">Перетащи .pixelmod файл</div>
    <div class="drop-sub">или нажми кнопку ниже, чтобы выбрать файл</div>
    <button class="drop-btn" onclick="document.getElementById('file-input').click()">Выбрать файл</button>
    <input type="file" id="file-input" accept=".pixelmod,.json">
    <button class="drop-demo-btn" onclick="loadDemo()">✨ Посмотреть пример</button>
  </div>

  <!-- Mod view -->
  <div id="mod-view">

    <!-- Mod card -->
    <div class="mod-card">
      <div class="mod-card-header">
        <div class="mod-avatar-big" id="view-avatar" style="background:rgba(124,58,237,0.15)">🤖</div>
        <div class="mod-main-info">
          <div class="mod-main-name" id="view-name">—</div>
          <div class="mod-main-desc" id="view-desc"></div>
          <div class="mod-badge" id="view-badge">📦 PixelMod</div>
        </div>
      </div>

      <div class="mod-meta" id="view-meta"></div>

      <!-- System prompt -->
      <div class="section">
        <div class="section-label">System Prompt</div>
        <div class="prompt-box" id="view-prompt"></div>
      </div>

      <!-- Actions -->
      <div class="actions">
        <a href="/app" class="btn-primary">💬 Использовать в чате</a>
        <button class="btn-ghost" onclick="copyRawJson()">📋 Скопировать JSON</button>
      </div>
    </div>

    <!-- Raw JSON -->
    <div class="section">
      <div class="section-label">
        <span class="raw-toggle" onclick="toggleRaw()">
          <span id="raw-arrow">▶</span> Исходный JSON
        </span>
      </div>
      <div class="raw-box" id="raw-box"></div>
    </div>

    <!-- Load another -->
    <div class="load-another">
      <button class="load-another-btn" onclick="resetView()">📂 Открыть другой файл</button>
    </div>

  </div>

</div>

<div id="toast"></div>

<script>
// ===== Built-in Markdown parser (no CDN needed) =====
function escHtml(t) { return String(t).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

function renderMd(src) {
  if (!src) return '';
  let out = '';
  const lines = src.split('\n');
  let i = 0;
  let inUl = false, inOl = false;

  function closeList() {
    if (inUl) { out += '</ul>'; inUl = false; }
    if (inOl) { out += '</ol>'; inOl = false; }
  }

  while (i < lines.length) {
    let line = lines[i];

    // Fenced code block ```lang
    if (/^```/.test(line)) {
      closeList();
      const lang = line.slice(3).trim() || 'code';
      const codeLines = [];
      i++;
      while (i < lines.length && !/^```/.test(lines[i])) {
        codeLines.push(lines[i]);
        i++;
      }
      const rawCode = codeLines.join('\n');
      const encoded = encodeURIComponent(rawCode);
      const escaped = escHtml(rawCode);
      out += `<div class="code-block-wrap"><div class="code-block-header"><span class="code-block-lang">${escHtml(lang)}</span><button class="code-block-copy" onclick="copyCodeBlock(this)" data-code="${encoded}">📋 Копировать</button></div><pre><code>${escaped}</code></pre></div>`;
      i++;
      continue;
    }

    // Heading
    const hm = line.match(/^(#{1,3})\s+(.*)/);
    if (hm) {
      closeList();
      const lvl = hm[1].length;
      out += `<h${lvl}>${inlineRender(hm[2])}</h${lvl}>`;
      i++; continue;
    }

    // Horizontal rule
    if (/^(---|\*\*\*|___)\s*$/.test(line)) {
      closeList();
      out += '<hr>';
      i++; continue;
    }

    // Unordered list
    const ulm = line.match(/^[-*+]\s+(.*)/);
    if (ulm) {
      if (!inUl) { if (inOl) { out += '</ol>'; inOl = false; } out += '<ul>'; inUl = true; }
      out += `<li>${inlineRender(ulm[1])}</li>`;
      i++; continue;
    }

    // Ordered list
    const olm = line.match(/^\d+\.\s+(.*)/);
    if (olm) {
      if (!inOl) { if (inUl) { out += '</ul>'; inUl = false; } out += '<ol>'; inOl = true; }
      out += `<li>${inlineRender(olm[1])}</li>`;
      i++; continue;
    }

    // Blockquote
    if (/^>\s?/.test(line)) {
      closeList();
      const qtext = line.replace(/^>\s?/, '');
      out += `<blockquote>${inlineRender(qtext)}</blockquote>`;
      i++; continue;
    }

    // Empty line
    if (line.trim() === '') {
      closeList();
      out += '';
      i++; continue;
    }

    // Normal paragraph
    closeList();
    out += `<p>${inlineRender(line)}</p>`;
    i++;
  }

  closeList();
  return out;
}

function inlineRender(t) {
  return escHtml(t)
    // Bold + italic ***
    .replace(/\*\*\*(.*?)\*\*\*/g, '<strong><em>$1</em></strong>')
    // Bold **
    .replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>')
    // Italic *
    .replace(/\*(.*?)\*/g, '<em>$1</em>')
    // Bold __
    .replace(/__(.*?)__/g, '<strong>$1</strong>')
    // Italic _
    .replace(/_(.*?)_/g, '<em>$1</em>')
    // Inline code `
    .replace(/`([^`]+)`/g, '<code>$1</code>')
    // Link [text](url)
    .replace(/\[([^\]]+)\]\(([^)]+)\)/g, '<a href="$2" target="_blank" rel="noopener">$1</a>');
}

function copyCodeBlock(btn) {
  const code = decodeURIComponent(btn.dataset.code);
  navigator.clipboard.writeText(code).then(() => {
    btn.textContent = '✅ Скопировано';
    btn.classList.add('copied');
    setTimeout(() => { btn.textContent = '📋 Копировать'; btn.classList.remove('copied'); }, 2000);
  }).catch(()=>{});
}

// ===== Demo =====
function loadDemo() {
  const demo = {
    name: "Code Assistant",
    avatar: "💻",
    color: "#3a8eff",
    description: "Помощник программиста — пишет, объясняет и отлаживает код",
    author: "PixelMind Team",
    version: "2.0",
    pixelmod_version: "1",
    system_prompt: `# Роль
Ты — опытный программист и наставник по имени **Алекс**. Помогаешь писать чистый, эффективный код.

## Как ты работаешь

- Всегда объясняешь *почему* решение именно такое
- Указываешь на потенциальные ошибки и улучшения
- Пишешь код с комментариями

## Пример ответа на вопрос

Если пользователь спрашивает про сортировку — покажи несколько подходов:

\`\`\`python
# Быстрая сортировка — O(n log n)
def quicksort(arr):
    if len(arr) <= 1:
        return arr
    pivot = arr[len(arr) // 2]
    left = [x for x in arr if x < pivot]
    mid  = [x for x in arr if x == pivot]
    right = [x for x in arr if x > pivot]
    return quicksort(left) + mid + quicksort(right)

# Пример использования
data = [3, 6, 8, 10, 1, 2, 1]
print(quicksort(data))  # [1, 1, 2, 3, 6, 8, 10]
\`\`\`

## Твои правила

1. Не пиши код без объяснений
2. Используй \`type hints\` в Python
3. Предпочитай читаемость оптимизации

> Хороший код — это код, который понятен другому человеку через год.

---

Если не знаешь ответа — **честно скажи об этом** и предложи где найти информацию.`
  };
  currentMod = demo;
  showMod(demo, 'mod-code_assistant.pixelmod');
}

// ===== File reading =====
let currentMod = null;

// Auto-load demo from URL param
if (new URLSearchParams(location.search).get('demo') === '1') {
  document.addEventListener('DOMContentLoaded', loadDemo);
}

function readFile(file) {
  if (!file) return;
  if (!file.name.endsWith('.pixelmod') && !file.name.endsWith('.json')) {
    showToast('❌ Нужен файл .pixelmod'); return;
  }
  const reader = new FileReader();
  reader.onload = (ev) => {
    try {
      const data = JSON.parse(ev.target.result);
      currentMod = data;
      showMod(data, file.name);
    } catch(e) {
      showToast('❌ Невалидный JSON — файл повреждён');
    }
  };
  reader.readAsText(file);
}

function showMod(data, filename) {
  const avatarEl  = document.getElementById('view-avatar');
  const nameEl    = document.getElementById('view-name');
  const descEl    = document.getElementById('view-desc');
  const badgeEl   = document.getElementById('view-badge');
  const metaEl    = document.getElementById('view-meta');
  const promptEl  = document.getElementById('view-prompt');
  const rawBox    = document.getElementById('raw-box');

  // Avatar
  const emoji = data.avatar || '🤖';
  const color = data.color || '#7c3aed';
  avatarEl.textContent = emoji;
  avatarEl.style.background = hexToRgba(color, 0.18);
  avatarEl.style.borderColor = hexToRgba(color, 0.4);

  // Name & desc
  nameEl.textContent = data.name || 'Без названия';
  descEl.textContent = data.description || '';
  descEl.style.display = data.description ? '' : 'none';

  // Badge
  badgeEl.innerHTML = `📦 PixelMod ${data.pixelmod_version ? 'v' + escHtml(data.pixelmod_version) : ''}`;
  badgeEl.style.borderColor = hexToRgba(color, 0.4);
  badgeEl.style.color = color;

  // Meta chips
  const chips = [];
  if (data.author) chips.push(`<div class="meta-chip">👤 Автор: <strong>${escHtml(data.author)}</strong></div>`);
  if (data.version) chips.push(`<div class="meta-chip">🏷️ Версия: <strong>${escHtml(data.version)}</strong></div>`);
  if (filename) chips.push(`<div class="meta-chip">📄 Файл: <strong>${escHtml(filename)}</strong></div>`);
  metaEl.innerHTML = chips.join('');
  metaEl.style.display = chips.length ? '' : 'none';

  // System prompt with markdown
  const promptText = data.system_prompt || '(system_prompt отсутствует)';
  promptEl.innerHTML = renderMd(promptText);

  // Raw JSON
  rawBox.textContent = JSON.stringify(data, null, 2);
  rawBox.classList.remove('visible');
  document.getElementById('raw-arrow').textContent = '▶';

  // Show mod view, hide drop zone
  document.getElementById('drop-zone').style.display = 'none';
  document.getElementById('mod-view').style.display = 'block';
  window.scrollTo(0, 0);
}

function resetView() {
  currentMod = null;
  document.getElementById('file-input').value = '';
  document.getElementById('drop-zone').style.display = '';
  document.getElementById('mod-view').style.display = 'none';
}

function toggleRaw() {
  const box = document.getElementById('raw-box');
  const arr = document.getElementById('raw-arrow');
  const visible = box.classList.toggle('visible');
  arr.textContent = visible ? '▼' : '▶';
}

function copyRawJson() {
  if (!currentMod) return;
  navigator.clipboard.writeText(JSON.stringify(currentMod, null, 2))
    .then(() => showToast('📋 JSON скопирован!'))
    .catch(()=>{});
}

// ===== Drag & Drop =====
const dropZone = document.getElementById('drop-zone');
const fileInput = document.getElementById('file-input');

dropZone.addEventListener('dragover', e => { e.preventDefault(); dropZone.classList.add('drag-over'); });
dropZone.addEventListener('dragleave', () => dropZone.classList.remove('drag-over'));
dropZone.addEventListener('drop', e => {
  e.preventDefault();
  dropZone.classList.remove('drag-over');
  const file = e.dataTransfer.files[0];
  if (file) readFile(file);
});
dropZone.addEventListener('click', e => {
  if (e.target.classList.contains('drop-btn')) return;
  fileInput.click();
});
fileInput.addEventListener('change', e => { if (e.target.files[0]) readFile(e.target.files[0]); });

// ===== Helpers =====
function hexToRgba(hex, alpha) {
  try {
    const r = parseInt(hex.slice(1,3),16);
    const g = parseInt(hex.slice(3,5),16);
    const b = parseInt(hex.slice(5,7),16);
    return `rgba(${r},${g},${b},${alpha})`;
  } catch(e) { return `rgba(124,58,237,${alpha})`; }
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2800);
}

</script>
