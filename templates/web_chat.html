<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Flux — AI Чат</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
:root {
  --bg1:#0a0e1a; --bg2:#0f1525;
  --glass:rgba(255,255,255,0.06);
  --glass-hover:rgba(255,255,255,0.10);
  --glass-border:rgba(255,255,255,0.10);
  --accent:#5aabff; --accent2:#34d058;
  --danger:#ff453a; --warn:#ff9500;
  --text:#e8eaf6; --text2:#8892b0;
  --radius:16px;
}
html,body { height:100%; font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif; background:#0a0e1a; color:var(--text); overflow:hidden; }

/* ===== AUTH SCREEN ===== */
#auth-screen {
  position:fixed; inset:0; z-index:100;
  display:flex; align-items:center; justify-content:center;
  background: radial-gradient(ellipse at 30% 20%, #0d1f3c 0%, #0a0e1a 60%, #060810 100%);
}
.auth-box {
  width:100%; max-width:420px; margin:16px;
  background:rgba(15,21,37,0.85);
  backdrop-filter:blur(24px) saturate(180%);
  -webkit-backdrop-filter:blur(24px) saturate(180%);
  border:1px solid var(--glass-border);
  border-radius:24px;
  padding:36px 32px 28px;
  box-shadow:0 24px 80px rgba(0,0,0,0.5), inset 0 1px 0 rgba(255,255,255,0.07);
}
.auth-logo { font-size:48px; text-align:center; margin-bottom:8px; filter:drop-shadow(0 0 20px rgba(90,171,255,0.5)); }
.auth-title { text-align:center; font-size:22px; font-weight:700; margin-bottom:4px; }
.auth-sub { text-align:center; color:var(--text2); font-size:14px; margin-bottom:24px; }

.auth-tabs { display:flex; gap:4px; background:rgba(0,0,0,0.25); border-radius:12px; padding:4px; margin-bottom:22px; }
.auth-tab { flex:1; padding:8px; border:none; border-radius:9px; font-size:13px; font-weight:600; cursor:pointer; background:transparent; color:var(--text2); transition:all .18s; }
.auth-tab.active { background:rgba(90,171,255,0.2); color:var(--accent); border:1px solid rgba(90,171,255,0.3); }

.auth-form { display:flex; flex-direction:column; gap:12px; }
.auth-input {
  width:100%; padding:12px 14px; border-radius:12px; font-size:14px;
  background:rgba(255,255,255,0.06); border:1px solid var(--glass-border);
  color:var(--text); outline:none; transition:border .2s;
}
.auth-input:focus { border-color:rgba(90,171,255,0.5); background:rgba(90,171,255,0.05); }
.auth-input::placeholder { color:var(--text2); }

.auth-btn {
  width:100%; padding:13px; border-radius:12px; font-size:14px; font-weight:700;
  background:linear-gradient(135deg,#3a8eff,#1a6edc); color:#fff; border:none;
  cursor:pointer; transition:all .18s; margin-top:4px;
  box-shadow:0 4px 18px rgba(58,142,255,0.3);
}
.auth-btn:hover { transform:translateY(-1px); box-shadow:0 6px 22px rgba(58,142,255,0.45); }
.auth-btn:active { transform:translateY(0); }
.auth-btn:disabled { opacity:.5; cursor:not-allowed; transform:none; }

.auth-error { color:var(--danger); font-size:13px; text-align:center; display:none; padding:8px; background:rgba(255,69,58,0.1); border-radius:9px; border:1px solid rgba(255,69,58,0.2); }

.back-to-admin { text-align:center; margin-top:16px; }
.back-to-admin a { color:var(--text2); font-size:13px; text-decoration:none; transition:color .2s; }
.back-to-admin a:hover { color:var(--accent); }

/* ===== APP SCREEN ===== */
#app-screen { display:none; height:100%; flex-direction:column; }
#app-screen.visible { display:flex; }

header {
  display:flex; align-items:center; justify-content:space-between;
  padding:0 20px; height:56px; flex-shrink:0;
  background:rgba(10,14,26,0.85);
  backdrop-filter:blur(20px) saturate(180%);
  -webkit-backdrop-filter:blur(20px) saturate(180%);
  border-bottom:1px solid var(--glass-border);
}
.header-logo { display:flex; align-items:center; gap:8px; font-size:18px; font-weight:700; }
.header-logo .bolt { font-size:20px; filter:drop-shadow(0 0 8px rgba(90,171,255,0.6)); }
.header-logo .name { background:linear-gradient(135deg,#5aabff,#a78bfa); -webkit-background-clip:text; -webkit-text-fill-color:transparent; }
.header-right { display:flex; align-items:center; gap:8px; }
.user-chip { display:flex; align-items:center; gap:7px; padding:6px 12px; border-radius:20px; background:var(--glass); border:1px solid var(--glass-border); font-size:13px; font-weight:500; }
.user-avatar { width:24px; height:24px; border-radius:50%; background:linear-gradient(135deg,#3a8eff,#a78bfa); display:flex; align-items:center; justify-content:center; font-size:11px; font-weight:700; color:#fff; flex-shrink:0; }
.hdr-btn { padding:6px 12px; border-radius:10px; font-size:12px; font-weight:600; border:none; cursor:pointer; transition:all .18s; }
.hdr-btn:hover { transform:translateY(-1px); }
.hdr-btn-ghost { background:var(--glass); color:var(--text2); border:1px solid var(--glass-border); }
.hdr-btn-ghost:hover { background:var(--glass-hover); color:var(--text); }
.hdr-btn-red { background:rgba(255,69,58,0.15); color:var(--danger); border:1px solid rgba(255,69,58,0.25); }
.hdr-btn-red:hover { background:rgba(255,69,58,0.25); }

/* ===== CHAT AREA ===== */
#chat-area {
  flex:1; overflow-y:auto; padding:20px; display:flex; flex-direction:column; gap:12px;
  scrollbar-width:thin; scrollbar-color:rgba(255,255,255,0.1) transparent;
}
#chat-area::-webkit-scrollbar { width:4px; }
#chat-area::-webkit-scrollbar-thumb { background:rgba(255,255,255,0.1); border-radius:4px; }

.msg { display:flex; gap:10px; max-width:76%; animation:fadeIn .25s ease; }
@keyframes fadeIn { from { opacity:0; transform:translateY(8px); } to { opacity:1; transform:translateY(0); } }
.msg.user { align-self:flex-end; flex-direction:row-reverse; }
.msg.assistant { align-self:flex-start; }

.msg-avatar { width:32px; height:32px; border-radius:50%; flex-shrink:0; display:flex; align-items:center; justify-content:center; font-size:14px; font-weight:700; }
.msg.user .msg-avatar { background:linear-gradient(135deg,#3a8eff,#1a6edc); color:#fff; }
.msg.assistant .msg-avatar { background:linear-gradient(135deg,#5aabff22,#a78bfa22); border:1px solid rgba(167,139,250,0.3); color:#a78bfa; font-size:16px; }

.msg-bubble {
  padding:11px 14px; border-radius:16px; font-size:14px; line-height:1.55;
  word-break:break-word; white-space:pre-wrap;
}
.msg.user .msg-bubble { background:linear-gradient(135deg,rgba(58,142,255,0.25),rgba(58,142,255,0.15)); border:1px solid rgba(58,142,255,0.3); border-bottom-right-radius:4px; }
.msg.assistant .msg-bubble { background:var(--glass); border:1px solid var(--glass-border); border-bottom-left-radius:4px; }

.msg-time { font-size:10px; color:var(--text2); margin-top:4px; padding:0 2px; align-self:flex-end; }

.empty-chat { flex:1; display:flex; flex-direction:column; align-items:center; justify-content:center; color:var(--text2); text-align:center; gap:12px; }
.empty-chat .big-icon { font-size:56px; filter:drop-shadow(0 0 20px rgba(90,171,255,0.4)); }
.empty-chat h2 { font-size:18px; font-weight:600; color:var(--text); }
.empty-chat p { font-size:14px; max-width:280px; }

/* Typing indicator */
.typing-bubble { display:none; align-items:center; gap:5px; padding:12px 14px; }
.typing-bubble.visible { display:flex; }
.dot { width:7px; height:7px; border-radius:50%; background:var(--accent); animation:bounce .9s infinite; }
.dot:nth-child(2) { animation-delay:.15s; }
.dot:nth-child(3) { animation-delay:.3s; }
@keyframes bounce { 0%,60%,100% { transform:translateY(0); } 30% { transform:translateY(-6px); } }

/* ===== INPUT AREA ===== */
#input-area {
  padding:14px 16px 20px; flex-shrink:0;
  background:rgba(10,14,26,0.7);
  backdrop-filter:blur(16px);
  border-top:1px solid var(--glass-border);
}
.input-row { display:flex; gap:10px; align-items:flex-end; }
#msg-input {
  flex:1; min-height:44px; max-height:130px; padding:11px 14px;
  border-radius:14px; font-size:14px; font-family:inherit;
  background:rgba(255,255,255,0.07); border:1px solid var(--glass-border);
  color:var(--text); outline:none; resize:none; line-height:1.4; transition:border .2s;
  scrollbar-width:none;
}
#msg-input:focus { border-color:rgba(90,171,255,0.45); background:rgba(90,171,255,0.05); }
#msg-input::placeholder { color:var(--text2); }
#msg-input::-webkit-scrollbar { display:none; }

.send-btn {
  width:44px; height:44px; border-radius:12px; flex-shrink:0;
  background:linear-gradient(135deg,#3a8eff,#1a6edc);
  border:none; cursor:pointer; display:flex; align-items:center; justify-content:center;
  font-size:18px; transition:all .18s; box-shadow:0 3px 12px rgba(58,142,255,0.35);
}
.send-btn:hover { transform:translateY(-1px) scale(1.05); box-shadow:0 5px 18px rgba(58,142,255,0.5); }
.send-btn:active { transform:scale(0.96); }
.send-btn:disabled { opacity:.4; cursor:not-allowed; transform:none; }

.input-hint { font-size:11px; color:var(--text2); text-align:center; margin-top:8px; }

/* ===== TOAST ===== */
#toast-container { position:fixed; bottom:24px; right:20px; z-index:9999; display:flex; flex-direction:column; gap:8px; align-items:flex-end; pointer-events:none; }
.toast { background:rgba(20,30,55,0.95); backdrop-filter:blur(12px); border:1px solid var(--glass-border); border-radius:12px; padding:10px 16px; font-size:13px; min-width:180px; max-width:300px; box-shadow:0 8px 24px rgba(0,0,0,0.4); pointer-events:all; animation:toastIn .3s ease; }
@keyframes toastIn { from { opacity:0; transform:translateY(16px) scale(.95); } to { opacity:1; transform:translateY(0) scale(1); } }
.toast.out { animation:toastOut .35s ease forwards; }
@keyframes toastOut { to { opacity:0; transform:translateY(8px) scale(.95); } }
.toast.ok { border-color:rgba(52,208,88,0.35); color:var(--accent2); }
.toast.err { border-color:rgba(255,69,58,0.35); color:var(--danger); }
.toast.info { border-color:rgba(90,171,255,0.35); color:var(--accent); }

/* ===== MOBILE ===== */
@media(max-width:600px) {
  .auth-box { padding:28px 20px 22px; }
  .user-chip span.uname { display:none; }
  #chat-area { padding:14px; }
  .msg { max-width:90%; }
}
</style>
</head>
<body>

<!-- AUTH SCREEN -->
<div id="auth-screen">
  <div class="auth-box">
    <div class="auth-logo">⚡</div>
    <div class="auth-title">Flux AI</div>
    <div class="auth-sub">Общайся с AI без Telegram</div>

    <div class="auth-tabs">
      <button class="auth-tab active" onclick="switchTab('login')">Войти</button>
      <button class="auth-tab" onclick="switchTab('register')">Регистрация</button>
    </div>

    <!-- LOGIN -->
    <div id="tab-login" class="auth-form">
      <input class="auth-input" id="l-login" type="text" placeholder="Логин или Email" autocomplete="username">
      <input class="auth-input" id="l-pwd" type="password" placeholder="Пароль" autocomplete="current-password">
      <div class="auth-error" id="l-err"></div>
      <button class="auth-btn" id="l-btn" onclick="doLogin()">Войти</button>
    </div>

    <!-- REGISTER step 1 -->
    <div id="tab-register" class="auth-form" style="display:none">
      <input class="auth-input" id="r-name" type="text" placeholder="Имя пользователя" autocomplete="username">
      <input class="auth-input" id="r-email" type="email" placeholder="Email" autocomplete="email">
      <input class="auth-input" id="r-pwd" type="password" placeholder="Пароль (мин. 6 символов)" autocomplete="new-password">
      <div class="auth-error" id="r-err"></div>
      <button class="auth-btn" id="r-btn" onclick="doRegister()">Получить код →</button>
    </div>

    <!-- REGISTER step 2 — verify -->
    <div id="tab-verify" class="auth-form" style="display:none">
      <div style="text-align:center;margin-bottom:4px;font-size:22px">📧</div>
      <div style="text-align:center;font-size:13px;color:var(--text2);margin-bottom:14px">Код отправлен на <b id="verify-email-label" style="color:var(--text)"></b></div>
      <input class="auth-input" id="v-code" type="text" inputmode="numeric" maxlength="6" placeholder="6-значный код" autocomplete="one-time-code" style="text-align:center;letter-spacing:6px;font-size:20px;font-weight:700">
      <div class="auth-error" id="v-err"></div>
      <button class="auth-btn" id="v-btn" onclick="doVerify()">Подтвердить и войти</button>
      <button id="v-resend-btn" onclick="doResendCode()" style="background:none;border:none;color:var(--text2);font-size:13px;cursor:pointer;padding:6px;text-align:center;width:100%;transition:color .2s" onmouseover="this.style.color='var(--accent)'" onmouseout="this.style.color='var(--text2)'">Отправить код повторно</button>
      <button onclick="backToRegister()" style="background:none;border:none;color:var(--text2);font-size:12px;cursor:pointer;padding:4px;text-align:center;width:100%">← Назад</button>
    </div>

    <div class="back-to-admin">
      <a href="/admin">← Вернуться на страницу входа в панель</a>
    </div>
  </div>
</div>

<!-- APP SCREEN -->
<div id="app-screen">
  <header>
    <div class="header-logo">
      <span class="bolt">⚡</span>
      <span class="name">Flux AI</span>
    </div>
    <div class="header-right">
      <div class="user-chip">
        <div class="user-avatar" id="user-avatar-letter">?</div>
        <span class="uname" id="header-username"></span>
      </div>
      <button class="hdr-btn hdr-btn-ghost" onclick="clearHistory()" title="Очистить историю">🗑</button>
      <button class="hdr-btn hdr-btn-red" onclick="doLogout()">Выйти</button>
    </div>
  </header>

  <div id="chat-area">
    <div class="empty-chat" id="empty-state">
      <div class="big-icon">⚡</div>
      <h2>Привет! Я Flux</h2>
      <p>AI-ассистент готов к общению. Напиши что-нибудь!</p>
    </div>
  </div>

  <div id="input-area">
    <div class="input-row">
      <textarea id="msg-input" placeholder="Напиши сообщение…" rows="1" onkeydown="inputKeydown(event)" oninput="autoResize(this)"></textarea>
      <button class="send-btn" id="send-btn" onclick="sendMsg()">➤</button>
    </div>
    <div class="input-hint">Enter — отправить &nbsp;·&nbsp; Shift+Enter — новая строка</div>
  </div>
</div>

<div id="toast-container"></div>

<script>
let currentUsername = '';
let isSending = false;
const toastQ = [];
let toastBusy = false;

let regToken = '';
let verifyMode = 'reg'; // 'reg' | 'email'
let resendTimer = null;

// ===== TABS =====
function switchTab(tab) {
  document.querySelectorAll('.auth-tab').forEach((b,i) => b.classList.toggle('active', (i===0&&tab==='login')||(i===1&&tab==='register')));
  document.getElementById('tab-login').style.display = tab==='login' ? 'flex' : 'none';
  document.getElementById('tab-register').style.display = tab==='register' ? 'flex' : 'none';
  document.getElementById('tab-verify').style.display = 'none';
}
function showVerifyStep(email, token, mode='reg') {
  regToken = token;
  verifyMode = mode;
  document.getElementById('tab-register').style.display = 'none';
  document.getElementById('tab-login').style.display = 'none';
  document.getElementById('tab-verify').style.display = 'flex';
  document.getElementById('verify-email-label').textContent = email;
  document.getElementById('v-code').value = '';
  document.getElementById('v-err').style.display = 'none';
  document.getElementById('v-btn').textContent = mode === 'email' ? 'Подтвердить и войти' : 'Подтвердить и войти';
  document.getElementById('v-code').focus();
  startResendTimer(60);
}
function backToRegister() {
  document.getElementById('tab-verify').style.display = 'none';
  if (resendTimer) { clearInterval(resendTimer); resendTimer = null; }
  if (verifyMode === 'email') {
    document.getElementById('tab-login').style.display = 'flex';
  } else {
    document.getElementById('tab-register').style.display = 'flex';
  }
}
function startResendTimer(sec) {
  const btn = document.getElementById('v-resend-btn');
  if (resendTimer) clearInterval(resendTimer);
  let left = sec;
  btn.disabled = true;
  btn.textContent = `Повторно через ${left} сек.`;
  resendTimer = setInterval(() => {
    left--;
    if (left <= 0) { clearInterval(resendTimer); resendTimer=null; btn.disabled=false; btn.textContent='Отправить код повторно'; }
    else { btn.textContent = `Повторно через ${left} сек.`; }
  }, 1000);
}

// ===== AUTH =====
async function doLogin() {
  const login = document.getElementById('l-login').value.trim();
  const pwd = document.getElementById('l-pwd').value;
  const errEl = document.getElementById('l-err');
  const btn = document.getElementById('l-btn');
  errEl.style.display = 'none';
  if (!login || !pwd) { showErr(errEl, 'Заполните все поля'); return; }
  btn.disabled = true; btn.textContent = 'Вход…';
  try {
    const r = await fetch('/app/login', { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({login,password:pwd}) });
    const d = await r.json();
    if (d.ok && d.step === 'verify_email') { showVerifyStep(d.email, d.token, 'email'); }
    else if (d.ok) { enterApp(d.username); }
    else { showErr(errEl, d.error || 'Ошибка'); }
  } catch(e) { showErr(errEl, 'Ошибка сети'); }
  btn.disabled = false; btn.textContent = 'Войти';
}

async function doRegister() {
  const name = document.getElementById('r-name').value.trim();
  const email = document.getElementById('r-email').value.trim();
  const pwd = document.getElementById('r-pwd').value;
  const errEl = document.getElementById('r-err');
  const btn = document.getElementById('r-btn');
  errEl.style.display = 'none';
  if (!name || !email || !pwd) { showErr(errEl, 'Заполните все поля'); return; }
  btn.disabled = true; btn.textContent = 'Отправляем код…';
  try {
    const r = await fetch('/app/register', { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({username:name,email,password:pwd}) });
    const d = await r.json();
    if (d.ok && d.step === 'verify') { showVerifyStep(d.email, d.token); }
    else { showErr(errEl, d.error || 'Ошибка'); }
  } catch(e) { showErr(errEl, 'Ошибка сети'); }
  btn.disabled = false; btn.textContent = 'Получить код →';
}

async function doVerify() {
  const code = document.getElementById('v-code').value.trim();
  const errEl = document.getElementById('v-err');
  const btn = document.getElementById('v-btn');
  errEl.style.display = 'none';
  if (!code) { showErr(errEl, 'Введите код'); return; }
  btn.disabled = true; btn.textContent = 'Проверяем…';
  const endpoint = verifyMode === 'email' ? '/app/verify-email' : '/app/verify';
  try {
    const r = await fetch(endpoint, { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({token:regToken, code}) });
    const d = await r.json();
    if (d.ok) { enterApp(d.username); toast('Добро пожаловать!', 'ok'); }
    else { showErr(errEl, d.error || 'Ошибка'); }
  } catch(e) { showErr(errEl, 'Ошибка сети'); }
  btn.disabled = false; btn.textContent = 'Подтвердить и войти';
}

async function doResendCode() {
  const errEl = document.getElementById('v-err');
  errEl.style.display = 'none';
  const endpoint = verifyMode === 'email' ? '/app/resend-email-verify' : '/app/resend-code';
  try {
    const r = await fetch(endpoint, { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({token:regToken}) });
    const d = await r.json();
    if (d.ok) { toast('Код отправлен повторно', 'ok'); startResendTimer(60); }
    else { showErr(errEl, d.error || 'Ошибка'); }
  } catch(e) { showErr(errEl, 'Ошибка сети'); }
}

async function doLogout() {
  await fetch('/app/logout', { method:'POST' });
  currentUsername = '';
  document.getElementById('app-screen').classList.remove('visible');
  document.getElementById('auth-screen').style.display = 'flex';
  document.getElementById('chat-area').innerHTML = `<div class="empty-chat" id="empty-state"><div class="big-icon">⚡</div><h2>Привет! Я Flux</h2><p>AI-ассистент готов к общению. Напиши что-нибудь!</p></div>`;
  switchTab('login');
}

function showErr(el, msg) { el.textContent = msg; el.style.display = 'block'; }

function enterApp(username) {
  currentUsername = username;
  document.getElementById('auth-screen').style.display = 'none';
  document.getElementById('app-screen').classList.add('visible');
  document.getElementById('header-username').textContent = username;
  document.getElementById('user-avatar-letter').textContent = username.charAt(0).toUpperCase();
  loadHistory();
  document.getElementById('msg-input').focus();
}

// ===== HISTORY =====
async function loadHistory() {
  try {
    const r = await fetch('/app/history');
    const d = await r.json();
    if (!d.ok) return;
    const area = document.getElementById('chat-area');
    if (!d.history.length) return;
    area.innerHTML = '';
    for (let i = 0; i < d.history.length; i++) {
      const m = d.history[i];
      appendMsg(m.role, m.content, m.ts, false);
    }
    area.scrollTop = area.scrollHeight;
  } catch(e) {}
}

async function clearHistory() {
  if (!confirm('Очистить всю историю чата?')) return;
  await fetch('/app/clear', { method:'POST' });
  document.getElementById('chat-area').innerHTML = `<div class="empty-chat" id="empty-state"><div class="big-icon">⚡</div><h2>Привет! Я Flux</h2><p>AI-ассистент готов к общению. Напиши что-нибудь!</p></div>`;
  toast('История очищена', 'ok');
}

// ===== CHAT =====
function appendMsg(role, content, ts, animate=true) {
  const area = document.getElementById('chat-area');
  const empty = document.getElementById('empty-state');
  if (empty) empty.remove();

  const isUser = role === 'user';
  const time = ts ? new Date(ts).toLocaleTimeString('ru-RU', {hour:'2-digit',minute:'2-digit'}) : '';

  const div = document.createElement('div');
  div.className = `msg ${role}`;
  div.innerHTML = `
    <div class="msg-avatar">${isUser ? currentUsername.charAt(0).toUpperCase() : '⚡'}</div>
    <div>
      <div class="msg-bubble">${escHtml(content)}</div>
      ${time ? `<div class="msg-time">${time}</div>` : ''}
    </div>`;
  if (!animate) div.style.animation = 'none';
  area.appendChild(div);
  area.scrollTop = area.scrollHeight;
  return div;
}

function showTyping() {
  const area = document.getElementById('chat-area');
  const div = document.createElement('div');
  div.className = 'msg assistant';
  div.id = 'typing-indicator';
  div.innerHTML = `<div class="msg-avatar">⚡</div><div class="msg-bubble typing-bubble visible"><span class="dot"></span><span class="dot"></span><span class="dot"></span></div>`;
  area.appendChild(div);
  area.scrollTop = area.scrollHeight;
}
function hideTyping() {
  const t = document.getElementById('typing-indicator');
  if (t) t.remove();
}

async function sendMsg() {
  if (isSending) return;
  const input = document.getElementById('msg-input');
  const text = input.value.trim();
  if (!text) return;
  input.value = '';
  autoResize(input);
  isSending = true;
  document.getElementById('send-btn').disabled = true;

  appendMsg('user', text, new Date().toISOString());
  showTyping();

  try {
    const r = await fetch('/app/chat', {
      method:'POST', headers:{'Content-Type':'application/json'},
      body: JSON.stringify({text})
    });
    const d = await r.json();
    hideTyping();
    if (d.ok) {
      appendMsg('assistant', d.reply, new Date().toISOString());
    } else {
      appendMsg('assistant', '⚠ ' + (d.error || 'Ошибка'), new Date().toISOString());
      toast(d.error || 'Ошибка', 'err');
    }
  } catch(e) {
    hideTyping();
    appendMsg('assistant', '⚠ Ошибка соединения', new Date().toISOString());
    toast('Ошибка соединения', 'err');
  }

  isSending = false;
  document.getElementById('send-btn').disabled = false;
  document.getElementById('msg-input').focus();
}

function inputKeydown(e) {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMsg(); }
}
function autoResize(el) {
  el.style.height = 'auto';
  el.style.height = Math.min(el.scrollHeight, 130) + 'px';
}

// ===== HELPERS =====
function escHtml(t) { return t.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

function toast(msg, type='info') {
  toastQ.push({msg,type}); if (!toastBusy) runToast();
}
function runToast() {
  if (!toastQ.length) { toastBusy=false; return; }
  toastBusy=true;
  const {msg,type} = toastQ.shift();
  const el = document.createElement('div');
  el.className = `toast ${type}`;
  el.textContent = msg;
  document.getElementById('toast-container').appendChild(el);
  setTimeout(() => { el.classList.add('out'); setTimeout(() => { el.remove(); runToast(); }, 380); }, 2800);
}

// ===== INIT =====
async function init() {
  try {
    const r = await fetch('/app/me');
    const d = await r.json();
    if (d.ok) { enterApp(d.username); }
  } catch(e) {}
  // Enter on inputs
  document.getElementById('l-pwd').addEventListener('keydown', e => { if(e.key==='Enter') doLogin(); });
  document.getElementById('r-pwd').addEventListener('keydown', e => { if(e.key==='Enter') doRegister(); });
  document.getElementById('v-code').addEventListener('keydown', e => { if(e.key==='Enter') doVerify(); });
}
init();
</script>
